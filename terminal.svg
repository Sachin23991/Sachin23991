<svg viewBox="0 0 720 310" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="termBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141b2d"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="titleBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e2d45"/>
      <stop offset="100%" stop-color="#162035"/>
    </linearGradient>
    <filter id="screenGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="outerGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    @keyframes appear { from{opacity:0} to{opacity:1} }
    @keyframes typeIn { from{clip-path:inset(0 100% 0 0)} to{clip-path:inset(0 0% 0 0)} }
    @keyframes glowPulse { 0%,100%{opacity:.6} 50%{opacity:1} }

    .cursor { animation: blink 1s step-end infinite; }
    .glowGreen { animation: glowPulse 2s ease-in-out infinite; }

    .line1 { opacity:0; animation: appear .01s .3s ease both; }
    .line2 { opacity:0; animation: appear .01s 1.2s ease both; }
    .line3 { opacity:0; animation: appear .01s 1.5s ease both; }
    .line4 { opacity:0; animation: appear .01s 2.0s ease both; }
    .line5 { opacity:0; animation: appear .01s 2.4s ease both; }
    .line6 { opacity:0; animation: appear .01s 2.8s ease both; }
    .line7 { opacity:0; animation: appear .01s 3.2s ease both; }
    .line8 { opacity:0; animation: appear .01s 3.7s ease both; }
    .line9 { opacity:0; animation: appear .01s 4.2s ease both; }
    .line10{ opacity:0; animation: appear .01s 4.7s ease both; }
    .line11{ opacity:0; animation: appear .01s 5.3s ease both; }
    .line12{ opacity:0; animation: appear .01s 5.9s ease both; }
    .line13{ opacity:0; animation: appear .01s 6.5s ease both; }
    .line14{ opacity:0; animation: appear .01s 7.2s ease both; }
    .lastCursor{ opacity:0; animation: appear .01s 7.3s ease both; }
  </style>

  <!-- Outer glow border -->
  <rect x="2" y="2" width="716" height="306" rx="10" ry="10" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.3" filter="url(#outerGlow)"/>

  <!-- Terminal window body -->
  <rect x="0" y="0" width="720" height="310" rx="10" ry="10" fill="url(#termBg)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="720" height="34" rx="10" ry="10" fill="url(#titleBar)"/>
  <rect x="0" y="22" width="720" height="12" fill="url(#titleBar)"/>

  <!-- macOS dots -->
  <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="17" r="6" fill="#febc2e"/>
  <circle cx="60" cy="17" r="6" fill="#28c840" filter="url(#screenGlow)" class="glowGreen"/>

  <!-- Title bar text -->
  <text x="360" y="22" text-anchor="middle" font-size="11" font-family="'Courier New', monospace" fill="#64748b">sachin@neural-lab: ~ [AI/ML Terminal]</text>

  <!-- Separator line -->
  <line x1="0" y1="34" x2="720" y2="34" stroke="#1e2d45" stroke-width="1.5"/>

  <!-- Terminal content -->
  <g font-family="'Courier New', Courier, monospace" font-size="12.5">

    <!-- Line 1: prompt + command -->
    <text x="16" y="58" class="line1">
      <tspan fill="#06b6d4">sachin</tspan>
      <tspan fill="#64748b">@</tspan>
      <tspan fill="#7c3aed">neural-lab</tspan>
      <tspan fill="#94a3b8"> ❯ </tspan>
      <tspan fill="#f8fafc">cat about_me.json</tspan>
    </text>

    <!-- Output: JSON block -->
    <text x="16" y="76" class="line2" fill="#475569">{</text>
    <text x="16" y="92" class="line3">
      <tspan fill="#475569">  </tspan>
      <tspan fill="#7c3aed">"name"</tspan>
      <tspan fill="#94a3b8">: </tspan>
      <tspan fill="#22c55e">"Sachin Rao"</tspan>
      <tspan fill="#475569">,</tspan>
    </text>
    <text x="16" y="108" class="line4">
      <tspan fill="#475569">  </tspan>
      <tspan fill="#7c3aed">"role"</tspan>
      <tspan fill="#94a3b8">: </tspan>
      <tspan fill="#22c55e">"Full Stack Dev + AI/ML Engineer"</tspan>
      <tspan fill="#475569">,</tspan>
    </text>
    <text x="16" y="124" class="line5">
      <tspan fill="#475569">  </tspan>
      <tspan fill="#7c3aed">"focus"</tspan>
      <tspan fill="#94a3b8">: [</tspan>
      <tspan fill="#f59e0b">"RAG Systems"</tspan>
      <tspan fill="#94a3b8">, </tspan>
      <tspan fill="#f59e0b">"LLM Fine-tuning"</tspan>
      <tspan fill="#94a3b8">, </tspan>
      <tspan fill="#f59e0b">"Cloud Arch"</tspan>
      <tspan fill="#94a3b8">],</tspan>
    </text>
    <text x="16" y="140" class="line6">
      <tspan fill="#475569">  </tspan>
      <tspan fill="#7c3aed">"open_to"</tspan>
      <tspan fill="#94a3b8">: </tspan>
      <tspan fill="#22c55e">"Collaboration &amp; Freelance"</tspan>
    </text>
    <text x="16" y="156" class="line7" fill="#475569">}</text>

    <!-- Empty line -->
    <!-- Line 8: next prompt + command -->
    <text x="16" y="178" class="line8">
      <tspan fill="#06b6d4">sachin</tspan>
      <tspan fill="#64748b">@</tspan>
      <tspan fill="#7c3aed">neural-lab</tspan>
      <tspan fill="#94a3b8"> ❯ </tspan>
      <tspan fill="#f8fafc">ls projects/</tspan>
    </text>

    <!-- Project listing -->
    <text x="16" y="197" class="line9">
      <tspan fill="#06b6d4">CareerFlow-AI/   </tspan>
      <tspan fill="#7c3aed">Resume-Analyzer/   </tspan>
      <tspan fill="#f59e0b">News-Scraper-Pipeline/   </tspan>
      <tspan fill="#22c55e">Saathi/</tspan>
    </text>

    <!-- Line 10: skills command -->
    <text x="16" y="219" class="line10">
      <tspan fill="#06b6d4">sachin</tspan>
      <tspan fill="#64748b">@</tspan>
      <tspan fill="#7c3aed">neural-lab</tspan>
      <tspan fill="#94a3b8"> ❯ </tspan>
      <tspan fill="#f8fafc">python -c "import sachin; print(sachin.skills)"</tspan>
    </text>

    <!-- Skills output -->
    <text x="16" y="238" class="line11" fill="#94a3b8">['Python', 'PyTorch', 'TensorFlow', 'FastAPI', 'React', 'TypeScript',</text>
    <text x="16" y="254" class="line12" fill="#94a3b8"> 'Docker', 'AWS', 'PostgreSQL', 'LangChain', 'RAG', 'MLOps']</text>

    <!-- Final prompt -->
    <text x="16" y="276" class="line13">
      <tspan fill="#06b6d4">sachin</tspan>
      <tspan fill="#64748b">@</tspan>
      <tspan fill="#7c3aed">neural-lab</tspan>
      <tspan fill="#94a3b8"> ❯ </tspan>
      <tspan fill="#f8fafc">echo $STATUS</tspan>
    </text>
    <text x="16" y="293" class="line14" fill="#22c55e">🚀 Building the future, one model at a time. Open to amazing opportunities!</text>

    <!-- Blinking cursor -->
    <rect x="16" y="280" width="8" height="14" fill="#22c55e" class="lastCursor cursor"/>
  </g>
</svg>
