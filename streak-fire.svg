<svg width="1200" height="70" viewBox="0 0 1200 70" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fireGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff8c00"/>
      <stop offset="30%" stop-color="#ff2d78"/>
      <stop offset="60%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#00f5ff"/>
    </linearGradient>

    <filter id="fireGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  
  <rect width="1200" height="70" fill="#020617" rx="18" ry="18"/>

  <!-- Animated gradient bar -->
  <rect x="-400" y="30" width="500" height="10" fill="url(#fireGrad)" filter="url(#fireGlow)">
    <animate attributeName="x" from="-400" to="1200" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Flame-like pulses -->
  <g fill="#ff8c00" opacity="0.75">
    <path d="M80 50 Q90 20 100 50 T120 50" filter="url(#fireGlow)">
      <animate attributeName="d"
               values="M80 50 Q90 20 100 50 T120 50;
                       M80 50 Q90 10 100 50 T120 50;
                       M80 50 Q90 20 100 50 T120 50"
               dur="2.2s" repeatCount="indefinite"/>
    </path>
    <path d="M300 50 Q310 25 320 50 T340 50" filter="url(#fireGlow)" opacity="0.8">
      <animate attributeName="d"
               values="M300 50 Q310 25 320 50 T340 50;
                       M300 50 Q310 8 320 50 T340 50;
                       M300 50 Q310 25 320 50 T340 50"
               dur="2.6s" repeatCount="indefinite"/>
    </path>
    <path d="M600 50 Q610 18 620 50 T640 50" filter="url(#fireGlow)" opacity="0.9">
      <animate attributeName="d"
               values="M600 50 Q610 18 620 50 T640 50;
                       M600 50 Q610 5 620 50 T640 50;
                       M600 50 Q610 18 620 50 T640 50"
               dur="2.9s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Label -->
  <text x="50%" y="26"
        text-anchor="middle"
        fill="#e5e7eb"
        font-size="14"
        font-family="Fira Code, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">
    🔥 Consistency + Contributions = Momentum
  </text>
  <text x="50%" y="46"
        text-anchor="middle"
        fill="#9ca3af"
        font-size="12"
        font-family="Fira Code, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">
    Streaks are great, but impact and learning matter more.
  </text>
</svg>
