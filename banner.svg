<svg width="100%" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#050520;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5ff" />
      <stop offset="35%" style="stop-color:#7b2ff7" />
      <stop offset="70%" style="stop-color:#ff2d78" />
      <stop offset="100%" style="stop-color:#00f5ff" />
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0;1 0;-1 0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#33ccff" />
      <stop offset="100%" style="stop-color:#a855f7" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <mask id="fadeMask">
      <linearGradient id="maskGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:white;stop-opacity:0"/>
        <stop offset="10%" style="stop-color:white;stop-opacity:1"/>
        <stop offset="90%" style="stop-color:white;stop-opacity:1"/>
        <stop offset="100%" style="stop-color:white;stop-opacity:0"/>
      </linearGradient>
      <rect width="100%" height="100%" fill="url(#maskGrad)"/>
    </mask>
    <style>
      .particle { animation: float linear infinite; }
      .code-char { font-family: 'Courier New', monospace; font-size: 11px; fill-opacity: 0.15; }
      @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
      @keyframes scan { 0%{transform:translateY(-280px)} 100%{transform:translateY(280px)} }
      @keyframes orbit { from{transform:rotate(0deg) translateX(120px) rotate(0deg)} to{transform:rotate(360deg) translateX(120px) rotate(-360deg)} }
      @keyframes flicker { 0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:0.6} 94%{opacity:1} 97%{opacity:0.8} 98%{opacity:1} }
      @keyframes rise { 0%{transform:translateY(0px);opacity:0} 10%{opacity:0.7} 90%{opacity:0.7} 100%{transform:translateY(-260px);opacity:0} }
      @keyframes shimmer { 0%,100%{opacity:0.05} 50%{opacity:0.12} }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.04" mask="url(#fadeMask)">
    <line x1="0" y1="40" x2="900" y2="40" stroke="#00f5ff" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="900" y2="80" stroke="#00f5ff" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="900" y2="120" stroke="#00f5ff" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="900" y2="160" stroke="#00f5ff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="900" y2="200" stroke="#00f5ff" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="900" y2="240" stroke="#00f5ff" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="280" stroke="#00f5ff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="280" stroke="#00f5ff" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="280" stroke="#00f5ff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="280" stroke="#00f5ff" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="280" stroke="#00f5ff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="280" stroke="#00f5ff" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="280" stroke="#00f5ff" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="280" stroke="#00f5ff" stroke-width="0.5"/>
  </g>

  <!-- Falling code rain columns -->
  <g class="code-char" fill="#00f5ff">
    <text x="30" y="10"><animate attributeName="y" values="-20;290" dur="3.2s" repeatCount="indefinite"/>1</text>
    <text x="30" y="30"><animate attributeName="y" values="10;310" dur="3.2s" repeatCount="indefinite"/>0</text>
    <text x="30" y="50"><animate attributeName="y" values="30;330" dur="3.2s" repeatCount="indefinite"/>λ</text>

    <text x="65" y="0"><animate attributeName="y" values="-10;290" dur="4.1s" begin="0.8s" repeatCount="indefinite"/>0</text>
    <text x="65" y="20"><animate attributeName="y" values="20;310" dur="4.1s" begin="0.8s" repeatCount="indefinite"/>1</text>

    <text x="150" y="0"><animate attributeName="y" values="-30;290" dur="3.7s" begin="1.2s" repeatCount="indefinite"/>f</text>
    <text x="150" y="20"><animate attributeName="y" values="0;310" dur="3.7s" begin="1.2s" repeatCount="indefinite"/>n</text>
    <text x="150" y="40"><animate attributeName="y" values="20;330" dur="3.7s" begin="1.2s" repeatCount="indefinite"/>⟨</text>

    <text x="820" y="10"><animate attributeName="y" values="-20;290" dur="3.5s" begin="0.3s" repeatCount="indefinite"/>1</text>
    <text x="820" y="30"><animate attributeName="y" values="5;295" dur="3.5s" begin="0.3s" repeatCount="indefinite"/>0</text>

    <text x="860" y="20"><animate attributeName="y" values="-10;290" dur="4.3s" begin="1.5s" repeatCount="indefinite"/>λ</text>
    <text x="860" y="40"><animate attributeName="y" values="20;310" dur="4.3s" begin="1.5s" repeatCount="indefinite"/>⟩</text>
  </g>

  <!-- Floating particles LEFT -->
  <circle r="2" fill="#00f5ff" filter="url(#glow)">
    <animateMotion dur="8s" repeatCount="indefinite" path="M 80,250 Q 50,180 90,100 Q 120,40 80,10"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle r="1.5" fill="#a855f7" filter="url(#softGlow)">
    <animateMotion dur="10s" repeatCount="indefinite" path="M 120,270 Q 80,200 130,130 Q 160,70 110,20"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.5" fill="#ff2d78" filter="url(#glow)">
    <animateMotion dur="7s" begin="2s" repeatCount="indefinite" path="M 50,280 Q 100,200 60,120 Q 30,60 70,0"/>
    <animate attributeName="opacity" values="0;1;0.7;0" dur="7s" begin="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Floating particles RIGHT -->
  <circle r="2" fill="#00f5ff" filter="url(#glow)">
    <animateMotion dur="9s" begin="1s" repeatCount="indefinite" path="M 820,280 Q 850,200 810,120 Q 780,60 830,10"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="9s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle r="1.8" fill="#a855f7" filter="url(#softGlow)">
    <animateMotion dur="11s" begin="3s" repeatCount="indefinite" path="M 870,270 Q 840,190 880,110 Q 910,50 870,10"/>
    <animate attributeName="opacity" values="0;0.9;0.7;0" dur="11s" begin="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Neural connection lines (decorative) -->
  <g opacity="0.12" stroke-width="0.8">
    <line x1="80" y1="50" x2="200" y2="90" stroke="#00f5ff">
      <animate attributeName="opacity" values="0.05;0.2;0.05" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="720" y1="60" x2="820" y2="100" stroke="#a855f7">
      <animate attributeName="opacity" values="0.05;0.25;0.05" dur="4s" begin="1s" repeatCount="indefinite"/>
    </line>
    <line x1="60" y1="200" x2="180" y2="170" stroke="#ff2d78">
      <animate attributeName="opacity" values="0.05;0.18;0.05" dur="5s" begin="2s" repeatCount="indefinite"/>
    </line>
    <line x1="740" y1="210" x2="850" y2="180" stroke="#00f5ff">
      <animate attributeName="opacity" values="0.05;0.2;0.05" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Node dots -->
  <circle cx="80" cy="50" r="3" fill="#00f5ff" filter="url(#glow)" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="90" r="2.5" fill="#a855f7" filter="url(#softGlow)" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="720" cy="60" r="3" fill="#ff2d78" filter="url(#glow)" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.5s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="820" cy="100" r="2.5" fill="#00f5ff" filter="url(#softGlow)" opacity="0.4">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="5s" begin="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="200" r="2.5" fill="#a855f7" filter="url(#glow)" opacity="0.4">
    <animate attributeName="opacity" values="0.15;0.7;0.15" dur="4s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="850" cy="180" r="3" fill="#ff2d78" filter="url(#softGlow)" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" begin="0.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Scan line effect -->
  <rect width="900" height="2" fill="url(#subGrad)" opacity="0.06">
    <animateTransform attributeName="transform" type="translate" values="0,-10;0,290" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Main glow backdrop for text -->
  <ellipse cx="450" cy="140" rx="300" ry="100" fill="#7b2ff7" opacity="0.04">
    <animate attributeName="rx" values="280;320;280" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.03;0.07;0.03" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Decorative top line -->
  <line x1="150" y1="42" x2="750" y2="42" stroke="url(#subGrad)" stroke-width="0.8" opacity="0.3"/>
  <circle cx="150" cy="42" r="2" fill="#00f5ff" opacity="0.5"/>
  <circle cx="750" cy="42" r="2" fill="#a855f7" opacity="0.5"/>

  <!-- Main Name - glow shadow -->
  <text x="450" y="120" text-anchor="middle" font-family="'Courier New', monospace" font-size="58" font-weight="900"
        fill="#7b2ff7" opacity="0.25" filter="url(#strongGlow)">SACHIN RAO</text>

  <!-- Main Name - solid with gradient -->
  <text x="450" y="120" text-anchor="middle" font-family="'Courier New', monospace" font-size="58" font-weight="900"
        fill="url(#textGrad)" filter="url(#glow)">
    SACHIN RAO
    <animate attributeName="opacity" values="0.9;1;0.95;1;0.9" dur="6s" repeatCount="indefinite"/>
  </text>

  <!-- Bracket decorations -->
  <text x="180" y="120" font-family="monospace" font-size="50" fill="#00f5ff" opacity="0.2" filter="url(#softGlow)">&lt;</text>
  <text x="700" y="120" font-family="monospace" font-size="50" fill="#a855f7" opacity="0.2" filter="url(#softGlow)">/&gt;</text>

  <!-- Subtitle -->
  <text x="450" y="155" text-anchor="middle" font-family="'Courier New', monospace" font-size="15" font-weight="600"
        fill="url(#subGrad)" letter-spacing="4" opacity="0.9">
    FULL STACK  ✦  AI/ML  ✦  OPEN SOURCE
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Decorative bottom line -->
  <line x1="150" y1="175" x2="750" y2="175" stroke="url(#subGrad)" stroke-width="0.8" opacity="0.3"/>
  <circle cx="150" cy="175" r="2" fill="#ff2d78" opacity="0.5"/>
  <circle cx="750" cy="175" r="2" fill="#00f5ff" opacity="0.5"/>

  <!-- Bottom status tags -->
  <g font-family="'Courier New', monospace" font-size="11" fill="#00f5ff" opacity="0.55">
    <rect x="200" y="195" width="115" height="20" rx="3" fill="#00f5ff" fill-opacity="0.07" stroke="#00f5ff" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="257" y="209" text-anchor="middle">⚡ Python · JS · TS</text>

    <rect x="335" y="195" width="100" height="20" rx="3" fill="#a855f7" fill-opacity="0.07" stroke="#a855f7" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="385" y="209" text-anchor="middle" fill="#a855f7">🤖 ML · LLMs · RAG</text>

    <rect x="455" y="195" width="110" height="20" rx="3" fill="#ff2d78" fill-opacity="0.07" stroke="#ff2d78" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="510" y="209" text-anchor="middle" fill="#ff2d78">☁ AWS · Docker · K8s</text>
  </g>

  <!-- Corner circuit decorations -->
  <g opacity="0.15" stroke="#00f5ff" stroke-width="1" fill="none">
    <polyline points="15,15 15,5 25,5"/>
    <polyline points="15,265 15,275 25,275"/>
    <circle cx="15" cy="15" r="2" fill="#00f5ff"/>
    <circle cx="15" cy="265" r="2" fill="#00f5ff"/>
  </g>
  <g opacity="0.15" stroke="#a855f7" stroke-width="1" fill="none">
    <polyline points="885,15 885,5 875,5"/>
    <polyline points="885,265 885,275 875,275"/>
    <circle cx="885" cy="15" r="2" fill="#a855f7"/>
    <circle cx="885" cy="265" r="2" fill="#a855f7"/>
  </g>

  <!-- Animated bottom pulse bar -->
  <rect x="0" y="274" width="900" height="3" fill="url(#textGrad)" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2s" repeatCount="indefinite"/>
  </rect>
</svg>
