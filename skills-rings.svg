<svg viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ringBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#050b15"/>
    </linearGradient>
    <!-- Ring gradients -->
    <linearGradient id="pyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="mlGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="reactGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="apiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/><stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="tsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="ringGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    /* Ring animation: circumference of r=38 circle = 2*pi*38 = 238.76 */
    /* Python 95%: dasharray = 226.8, 11.9 */
    /* ML 90%:     dasharray = 214.9, 23.9 */
    /* React 85%:  dasharray = 202.9, 35.9 */
    /* FastAPI 88%:dasharray = 210.1, 28.7 */
    /* Cloud 80%:  dasharray = 191    47.8 */
    /* TypeScript 83%: dasharray = 198.2 40.6 */

    @keyframes ring1 { from{stroke-dasharray:0 238.76} to{stroke-dasharray:226.8 11.9} }
    @keyframes ring2 { from{stroke-dasharray:0 238.76} to{stroke-dasharray:214.9 23.9} }
    @keyframes ring3 { from{stroke-dasharray:0 238.76} to{stroke-dasharray:202.9 35.9} }
    @keyframes ring4 { from{stroke-dasharray:0 238.76} to{stroke-dasharray:210.1 28.7} }
    @keyframes ring5 { from{stroke-dasharray:0 238.76} to{stroke-dasharray:191.0 47.8} }
    @keyframes ring6 { from{stroke-dasharray:0 238.76} to{stroke-dasharray:198.2 40.6} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes orb    { 0%,100%{opacity:.12} 50%{opacity:.25} }

    .r1 { stroke-dasharray:0 238.76; animation: ring1 2.0s 0.2s cubic-bezier(.4,0,.2,1) forwards; }
    .r2 { stroke-dasharray:0 238.76; animation: ring2 2.0s 0.5s cubic-bezier(.4,0,.2,1) forwards; }
    .r3 { stroke-dasharray:0 238.76; animation: ring3 2.0s 0.8s cubic-bezier(.4,0,.2,1) forwards; }
    .r4 { stroke-dasharray:0 238.76; animation: ring4 2.0s 1.1s cubic-bezier(.4,0,.2,1) forwards; }
    .r5 { stroke-dasharray:0 238.76; animation: ring5 2.0s 1.4s cubic-bezier(.4,0,.2,1) forwards; }
    .r6 { stroke-dasharray:0 238.76; animation: ring6 2.0s 1.7s cubic-bezier(.4,0,.2,1) forwards; }
    .fadeUp { opacity:0; animation: fadeUp 0.8s 2.5s ease both; }
    .cardOrb { animation: orb 4s ease-in-out infinite; }
  </style>

  <!-- Background -->
  <rect width="900" height="220" fill="url(#ringBg)" rx="12"/>

  <!-- Subtle background orbs -->
  <circle cx="150" cy="110" r="80" fill="#f59e0b" class="cardOrb"/>
  <circle cx="450" cy="110" r="80" fill="#7c3aed" class="cardOrb"/>
  <circle cx="750" cy="110" r="80" fill="#06b6d4" class="cardOrb"/>

  <!-- Section title -->
  <text x="450" y="22" text-anchor="middle" font-size="11" font-family="'Courier New', monospace" fill="#475569" letter-spacing="3">SKILL PROFICIENCY</text>

  <!-- =================== CARD 1: Python =================== -->
  <g transform="translate(75, 30)">
    <!-- Track circle -->
    <circle cx="75" cy="80" r="38" fill="none" stroke="#1e293b" stroke-width="7"/>
    <!-- Progress ring -->
    <circle cx="75" cy="80" r="38" fill="none" stroke="url(#pyGrad)" stroke-width="7"
            stroke-linecap="round" stroke-dashoffset="-15" class="r1" filter="url(#ringGlow)"
            transform="rotate(-90 75 80)"/>
    <!-- Center text -->
    <text x="75" y="76" text-anchor="middle" font-size="16" font-weight="bold"
          font-family="Arial, sans-serif" fill="#f59e0b">95%</text>
    <text x="75" y="90" text-anchor="middle" font-size="8"
          font-family="'Courier New', monospace" fill="#64748b">PYTHON</text>
    <!-- Icon -->
    <text x="75" y="136" text-anchor="middle" font-size="11"
          font-family="'Courier New', monospace" fill="#94a3b8" class="fadeUp">🐍 Python</text>
  </g>

  <!-- =================== CARD 2: ML/DL =================== -->
  <g transform="translate(225, 30)">
    <circle cx="75" cy="80" r="38" fill="none" stroke="#1e293b" stroke-width="7"/>
    <circle cx="75" cy="80" r="38" fill="none" stroke="url(#mlGrad)" stroke-width="7"
            stroke-linecap="round" stroke-dashoffset="-15" class="r2" filter="url(#ringGlow)"
            transform="rotate(-90 75 80)"/>
    <text x="75" y="76" text-anchor="middle" font-size="16" font-weight="bold"
          font-family="Arial, sans-serif" fill="#a855f7">90%</text>
    <text x="75" y="90" text-anchor="middle" font-size="8"
          font-family="'Courier New', monospace" fill="#64748b">ML / DL</text>
    <text x="75" y="136" text-anchor="middle" font-size="11"
          font-family="'Courier New', monospace" fill="#94a3b8" class="fadeUp">🤖 AI/ML</text>
  </g>

  <!-- =================== CARD 3: React =================== -->
  <g transform="translate(375, 30)">
    <circle cx="75" cy="80" r="38" fill="none" stroke="#1e293b" stroke-width="7"/>
    <circle cx="75" cy="80" r="38" fill="none" stroke="url(#reactGrad)" stroke-width="7"
            stroke-linecap="round" stroke-dashoffset="-15" class="r3" filter="url(#ringGlow)"
            transform="rotate(-90 75 80)"/>
    <text x="75" y="76" text-anchor="middle" font-size="16" font-weight="bold"
          font-family="Arial, sans-serif" fill="#22d3ee">85%</text>
    <text x="75" y="90" text-anchor="middle" font-size="8"
          font-family="'Courier New', monospace" fill="#64748b">REACT</text>
    <text x="75" y="136" text-anchor="middle" font-size="11"
          font-family="'Courier New', monospace" fill="#94a3b8" class="fadeUp">⚛ React</text>
  </g>

  <!-- =================== CARD 4: FastAPI =================== -->
  <g transform="translate(525, 30)">
    <circle cx="75" cy="80" r="38" fill="none" stroke="#1e293b" stroke-width="7"/>
    <circle cx="75" cy="80" r="38" fill="none" stroke="url(#apiGrad)" stroke-width="7"
            stroke-linecap="round" stroke-dashoffset="-15" class="r4" filter="url(#ringGlow)"
            transform="rotate(-90 75 80)"/>
    <text x="75" y="76" text-anchor="middle" font-size="16" font-weight="bold"
          font-family="Arial, sans-serif" fill="#4ade80">88%</text>
    <text x="75" y="90" text-anchor="middle" font-size="8"
          font-family="'Courier New', monospace" fill="#64748b">FASTAPI</text>
    <text x="75" y="136" text-anchor="middle" font-size="11"
          font-family="'Courier New', monospace" fill="#94a3b8" class="fadeUp">⚡ FastAPI</text>
  </g>

  <!-- =================== CARD 5: Cloud/Docker =================== -->
  <g transform="translate(675, 30)">
    <circle cx="75" cy="80" r="38" fill="none" stroke="#1e293b" stroke-width="7"/>
    <circle cx="75" cy="80" r="38" fill="none" stroke="url(#cloudGrad)" stroke-width="7"
            stroke-linecap="round" stroke-dashoffset="-15" class="r5" filter="url(#ringGlow)"
            transform="rotate(-90 75 80)"/>
    <text x="75" y="76" text-anchor="middle" font-size="16" font-weight="bold"
          font-family="Arial, sans-serif" fill="#fb923c">80%</text>
    <text x="75" y="90" text-anchor="middle" font-size="8"
          font-family="'Courier New', monospace" fill="#64748b">AWS/DOCKER</text>
    <text x="75" y="136" text-anchor="middle" font-size="11"
          font-family="'Courier New', monospace" fill="#94a3b8" class="fadeUp">☁ Cloud</text>
  </g>

  <!-- Bottom label -->
  <text x="450" y="205" text-anchor="middle" font-size="9.5"
        font-family="'Courier New', monospace" fill="#334155" class="fadeUp">
    ● Continuously learning &amp; growing ●
  </text>
</svg>
